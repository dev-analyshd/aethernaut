kind = "web"
previewPath = "/"
title = "AETHERNAUT"
version = "1.0.0"
id = "artifacts/aethernaut"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18360

[services.development]
run = "pnpm --filter @workspace/aethernaut run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aethernaut", "run", "build" ]
publicDir = "artifacts/aethernaut/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18360"
BASE_PATH = "/"
